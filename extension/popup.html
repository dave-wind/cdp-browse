<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:400px;background:#0f1117;color:#e4e8ee;font:13px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}

/* ── header ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 14px;background:linear-gradient(135deg,#141620 0%,#1a1d2e 100%);border-bottom:1px solid rgba(255,255,255,.06);}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px;box-shadow:0 2px 12px rgba(99,102,241,.3)}
.brand-name{font-size:14px;font-weight:700;letter-spacing:-.2px;color:#f0f2f5}
.brand-sub{font-size:11px;color:#6b7280;margin-top:1px}
.btn-refresh{display:flex;align-items:center;gap:5px;height:30px;border:0;border-radius:8px;padding:0 14px;background:rgba(255,255,255,.07);color:#c0c6d0;font:600 11px/1 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;cursor:pointer;transition:all .15s ease}
.btn-refresh:hover{background:rgba(255,255,255,.12);color:#fff}
.btn-refresh:active{transform:scale(.97)}
.btn-refresh.loading{opacity:.5;pointer-events:none}
.btn-refresh svg{width:13px;height:13px;transition:transform .4s ease}
.btn-refresh.loading svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── status bar ── */
.status-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.04)}
.status-left{display:flex;align-items:center;gap:7px;font-size:11px;color:#6b7280}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot.green{background:#34d399;box-shadow:0 0 6px rgba(52,211,153,.4)}
.dot.yellow{background:#fbbf24;box-shadow:0 0 6px rgba(251,191,36,.4)}
.dot.red{background:#f87171;box-shadow:0 0 6px rgba(248,113,113,.4)}
.status-count{font-size:11px;color:#6b7280;font-variant-numeric:tabular-nums}
.status-count b{color:#a5b4fc;font-weight:600}

/* ── cookie list ── */
.list{max-height:340px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
.list::-webkit-scrollbar{width:5px}
.list::-webkit-scrollbar-track{background:transparent}
.list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}

.row{display:flex;align-items:stretch;padding:0 12px;gap:0;transition:background .1s ease;cursor:default;border-bottom:1px solid rgba(255,255,255,.03)}
.row:hover{background:rgba(255,255,255,.03)}
.row-inner{flex:1;padding:10px 4px;min-width:0}
.row-name{font-size:12px;font-weight:600;color:#c9d1d9;word-break:break-all;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.row-value{font-size:11px;color:#6b7280;margin-top:3px;word-break:break-all;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;max-height:40px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* badges */
.badge{display:inline-flex;align-items:center;height:16px;padding:0 5px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.3px;flex-shrink:0}
.badge-h{background:rgba(251,191,36,.12);color:#fbbf24}
.badge-s{background:rgba(52,211,153,.12);color:#34d399}
.badge-p{background:rgba(167,139,250,.12);color:#a78bfa}

/* ── copy button per row ── */
.copy-btn{align-self:center;width:26px;height:26px;border:0;border-radius:6px;background:transparent;color:#4b5563;cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:all .12s ease;opacity:0}
.row:hover .copy-btn{opacity:1}
.copy-btn:hover{background:rgba(255,255,255,.06);color:#a5b4fc}
.copy-btn svg{width:13px;height:13px}
.copy-btn.copied{color:#34d399}

/* ── empty state ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;color:#4b5563;gap:8px}
.empty-icon{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.03);display:grid;place-items:center;font-size:18px}
.empty-text{font-size:12px}

/* ── footer ── */
.footer{padding:8px 16px;text-align:center;font-size:10px;color:#3b3f4a;border-top:1px solid rgba(255,255,255,.04);background:rgba(255,255,255,.01)}
</style>
</head>
<body>
<div class="header">
  <div class="brand">
    <div class="logo">B</div>
    <div>
      <div class="brand-name">CDP Browse Bridge</div>
      <div class="brand-sub">Cookies for current tab</div>
    </div>
  </div>
  <button class="btn-refresh" id="refresh">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    <span>Refresh</span>
  </button>
</div>
<div class="status-bar">
  <div class="status-left"><span class="dot green" id="dot"></span><span id="state">Ready</span></div>
  <div class="status-count" id="count"></div>
</div>
<div id="list" class="list"></div>
<div class="footer">Auto-copied to clipboard</div>
<script src="popup.js"></script>
</body>
</html>
